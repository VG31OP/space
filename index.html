<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WORLDVIEW | Real-Time Geospatial Intelligence</title>
    <meta
      name="description"
      content="Real-time global situational awareness for flights, satellites, ships, weather, wildfire, and signal disruption."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link
      href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23060a08' stroke='%2300ff88' stroke-width='3'/><text y='65' x='50' text-anchor='middle' font-size='50' fill='%2300ff88'>W</text></svg>">
  </head>
  <body>
    <div id="loadingScreen" style="position:fixed;inset:0;z-index:9999;background:#060a08;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;">
      <div style="font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#fff;letter-spacing:0.1em;margin-bottom:8px;">WORLD<span style="color:#00ff88;">|</span>VIEW</div>
      <div style="font-size:11px;color:#445566;letter-spacing:0.2em;margin-bottom:40px;">GEOSPATIAL INTELLIGENCE PLATFORM</div>
      <div style="width:200px;height:2px;background:#0d2018;border-radius:2px;overflow:hidden;margin-bottom:16px;">
        <div id="loadingBar" style="height:100%;width:0%;background:#00ff88;transition:width 0.3s;box-shadow:0 0 8px #00ff88;"></div>
      </div>
      <div id="loadingStatus" style="font-size:10px;color:#334455;letter-spacing:0.15em;">INITIALIZING SYSTEMS...</div>
    </div>
    <canvas id="starfield" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>
    <div id="app">
      <div id="cesiumContainer"></div>
      <div id="visualOverlay" class="visual-overlay"></div>
      <canvas id="noiseOverlay" class="noise-overlay"></canvas>

      <header class="topbar">
        <div class="topbar-left">
          <div class="logo">
            <span class="logo-world">WORLD</span>
            <span class="logo-sep">|</span>
            <span class="logo-view">VIEW</span>
          </div>
          <div class="logo-badge">OSINT</div>
        </div>
        <div class="topbar-center">
          <nav class="mode-selector" id="modeButtons" style="display:flex;flex-direction:row;gap:4px;background:rgba(0,0,0,0.5);border:1px solid #0d2018;border-radius:8px;padding:4px;">
            <button class="mode-pill active" data-mode="normal" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 12px;border-radius:5px;border:1px solid rgba(0,255,136,0.3);background:rgba(0,255,136,0.1);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;">
              <span style="color:#00ff88;">O</span>
              <span style="color:#00ff88;">NORMAL</span>
            </button>
            <button class="mode-pill" data-mode="thermal" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 12px;border-radius:5px;border:1px solid transparent;background:transparent;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;">
              <span style="color:#ff7a1a;">[]</span>
              <span style="color:#7b8f9f;">THERMAL</span>
            </button>
            <button class="mode-pill" data-mode="nvg" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 12px;border-radius:5px;border:1px solid transparent;background:transparent;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;">
              <span style="color:#00ff44;">&lt;&gt;</span>
              <span style="color:#7b8f9f;">NVG</span>
            </button>
            <button class="mode-pill" data-mode="crt" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 12px;border-radius:5px;border:1px solid transparent;background:transparent;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;">
              <span style="color:#66bbff;">#</span>
              <span style="color:#7b8f9f;">CRT</span>
            </button>
          </nav>
        </div>
        <div class="topbar-right">
          <div class="status-indicator status-pill" id="statusPill">
            <span class="status-dot nominal" id="statusDot"></span>
            <span class="status-text" id="statusText">NOMINAL</span>
          </div>
          <div class="data-freshness" id="dataFreshness" title="Waiting for first data payload">
            <span class="freshness-dot red" id="dataFreshnessDot"></span>
            <span class="freshness-text" id="dataFreshnessText">Loading...</span>
          </div>
          <div class="divider-v"></div>
          <div class="utc-clock" id="utcClock">00:00:00 UTC</div>
        </div>
      </header>

      <aside class="left-panel" id="leftPanel">
        <div class="panel-header">
          <span class="panel-title">Layer Matrix</span>
          <button class="panel-collapse" id="leftCollapse" aria-label="Collapse layer panel">-</button>
        </div>
        <div class="panel-body" id="layerPanelBody">
          <div class="layer-section-header">Aircraft</div>
          <label class="layer-row" data-layer="commercial">
            <input class="layer-input" type="checkbox" id="layer-comm" checked />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon commercial-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5z"/></svg></span>
            <span class="layer-label">Commercial</span>
            <span class="layer-count" id="badge-comm">0</span>
          </label>
          <label class="layer-row" data-layer="military">
            <input class="layer-input" type="checkbox" id="layer-mil" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon military-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 13.2 14.9 12 12 4l-2.9 8L2 13.2l6 2.2v3.1L6 20.5V22l6-1.7 6 1.7v-1.5L16 18.5v-3.1z"/></svg></span>
            <span class="layer-label">Military</span>
            <span class="layer-count" id="badge-mil">0</span>
          </label>
          <label class="layer-row" data-layer="helicopter">
            <input class="layer-input" type="checkbox" id="layer-heli" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon helicopter-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h18"/><path d="M12 3v5"/><path d="M6 12h7a3 3 0 0 1 0 6H9"/><path d="M5 18h4"/><path d="M15 12h4l2 2"/></svg></span>
            <span class="layer-label">Helicopter</span>
            <span class="layer-count" id="badge-heli">0</span>
          </label>
          <label class="layer-row" data-layer="private">
            <input class="layer-input" type="checkbox" id="layer-priv" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon private-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="m20 14-6.7-2.4L11 4.5a1 1 0 0 0-2 0v5.4L3 12v1.6l6-.8v4L7.4 18v1.5l2.6-.7 2.6.7V18L11 16.8v-4.2l9 1.4z"/></svg></span>
            <span class="layer-label">Private Jets</span>
            <span class="layer-count" id="badge-priv">0</span>
          </label>

          <div class="layer-section-header">Space</div>
          <label class="layer-row" data-layer="satellites">
            <input class="layer-input" type="checkbox" id="layer-sats" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon sats-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7 4 4"/><path d="m17 17 3 3"/><rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor" stroke="none"/><path d="M14 10 9 15"/><path d="m15.5 5.5 3 3"/><path d="m5.5 15.5 3 3"/><path d="M12 2v4"/><path d="M22 12h-4"/><path d="M12 22v-4"/><path d="M2 12h4"/></svg></span>
            <span class="layer-label">Active Sats</span>
            <span class="layer-count" id="badge-sats">0</span>
          </label>
          <label class="layer-row" data-layer="iss">
            <input class="layer-input" type="checkbox" id="layer-iss" checked />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon iss-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 10h4V8h2v2h6V8h2v2h4v4h-4v2h-2v-2H9v2H7v-2H3zm7-5h4v2h-4zm0 12h4v2h-4z"/></svg></span>
            <span class="layer-label">ISS</span>
            <span class="layer-count" id="badge-iss">0</span>
          </label>
          <label class="layer-row" data-layer="starlink">
            <input class="layer-input" type="checkbox" id="layer-star" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon starlink-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="7" r="1.6"/><circle cx="12" cy="5" r="1.6"/><circle cx="18" cy="8" r="1.6"/><circle cx="9" cy="14" r="1.6"/><circle cx="15" cy="16" r="1.6"/><circle cx="6" cy="18" r="1.6"/><path d="M6 7l6-2m0 0 6 3M12 5l-3 9m9-6-3 8M9 14l6 2m-9 2 3-4" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></span>
            <span class="layer-label">Starlink</span>
            <span class="layer-count" id="badge-star">0</span>
          </label>
          <label class="layer-row" data-layer="debris">
            <input class="layer-input" type="checkbox" id="layer-deb" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon debris-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="m12 3 1.4 5.2L19 6l-3.8 3.8L21 12l-5.8 2.2L19 18l-5.6-2.2L12 21l-1.4-5.2L5 18l3.8-3.8L3 12l5.8-2.2L5 6l5.6 2.2z"/></svg></span>
            <span class="layer-label">Debris</span>
            <span class="layer-count" id="badge-deb">0</span>
          </label>

          <div class="layer-section-header">Maritime</div>
          <label class="layer-row" data-layer="cargo">
            <input class="layer-input" type="checkbox" id="layer-cargo" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon cargo-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 15h18l-1.5 4.5A3.6 3.6 0 0 1 16.1 22c-1.2 0-2.1-.4-3.1-1-1 .6-1.9 1-3 1-1.2 0-2.1-.4-3.1-1a5.3 5.3 0 0 1-3.4-2.5z"/><path d="M5 8h10v4H5z"/><path d="M15 10h4v2h-4z"/><path d="M7 6h6v2H7z"/></svg></span>
            <span class="layer-label">Cargo Ships</span>
            <span class="layer-count" id="badge-cargo">0</span>
          </label>
          <label class="layer-row" data-layer="tankers">
            <input class="layer-input" type="checkbox" id="layer-tank" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon tanker-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 4c0 2.8 2.3 4.4 2.3 6.4A3.7 3.7 0 0 1 3 10.4C3 8.4 5.3 6.8 8 4Z"/><path d="M4 15h17l-1 3.5A3 3 0 0 1 17.1 21c-1 0-1.9-.3-2.8-.8-.9.5-1.8.8-2.8.8-1 0-1.9-.3-2.8-.8-.9.5-1.8.8-2.8.8a4.3 4.3 0 0 1-2.9-2.5z"/></svg></span>
            <span class="layer-label">Tankers</span>
            <span class="layer-count" id="badge-tank">0</span>
          </label>
          <label class="layer-row" data-layer="naval">
            <input class="layer-input" type="checkbox" id="layer-naval" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon naval-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 2h2v4h3v2h-3v6.1a4 4 0 0 0 3-3.9h2a6 6 0 0 1-5 5.9V20l3 2h-4l-4-2 3-3.7v-.1a6 6 0 0 1-5-5.9h2a4 4 0 0 0 3 3.9V8H8V6h3z"/></svg></span>
            <span class="layer-label">Naval</span>
            <span class="layer-count" id="badge-naval">0</span>
          </label>
          <label class="layer-row" data-layer="fishing">
            <input class="layer-input" type="checkbox" id="layer-fish" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon fishing-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 5a5 5 0 0 0-5 5v6a3 3 0 1 1-3-3"/><path d="M18 5V3"/><path d="M13 10h5"/><path d="M10 13c0-2.2-1.8-4-4-4H3c0 2.2 1.8 4 4 4z"/></svg></span>
            <span class="layer-label">Fishing</span>
            <span class="layer-count" id="badge-fish">0</span>
          </label>

          <div class="layer-section-header">Intel</div>
          <label class="layer-row" data-layer="wildfire">
            <input class="layer-input" type="checkbox" id="layer-fire" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon wildfire-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 2s.5 2.2-1.3 4.1c-1.5 1.6-2 3-1.3 4.7.5 1.3 2 2.2 2 2.2s.3-1.8 1.9-3.3c1.6-1.5 3.2-3 3.2-5.7 2.1 2.1 3 4.3 3 6.4 0 5.7-4.2 10.6-9.8 10.6S2 17.2 2 12.8c0-3.6 2.3-6.1 4.4-8.4 0 2 1 3.5 2.3 4.3 0 0 .2-1.8 1.6-3.4C11.7 3.8 13.5 2 13.5 2Z"/></svg></span>
            <span class="layer-label">Wildfire</span>
            <span class="layer-count" id="badge-fire">0</span>
          </label>
          <label class="layer-row" data-layer="weather">
            <input class="layer-input" type="checkbox" id="layer-wea" />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon weather-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 18h9.5A4.5 4.5 0 1 0 16 9a6 6 0 0 0-11.6 2A3.5 3.5 0 0 0 7 18Z"/><path d="m11 19-2 3h3l-1 2 4-5h-3l1-2z"/></svg></span>
            <span class="layer-label">Weather</span>
            <span class="layer-count" id="badge-wea">0</span>
          </label>
          <label class="layer-row" data-layer="earthquakes">
            <input class="layer-input" type="checkbox" id="layer-quakes" checked />
            <span class="layer-toggle"><span class="toggle-track"><span class="toggle-thumb"></span></span></span>
            <span class="layer-icon quakes-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h5l2 8 5-16 3 8h5"/></svg></span>
            <span class="layer-label">Earthquakes</span>
            <span class="layer-count" id="badge-quakes">0</span>
          </label>
        </div>
      </aside>

      <aside class="right-panel" id="rightPanel">
        <div class="tab-bar">
          <div style="display:flex;gap:2px;padding:8px 12px;border-bottom:1px solid rgba(0,255,136,0.1);width:100%;">
            <button class="ai-tab-btn active" data-tab="news" style="flex:1;padding:6px 8px;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:5px;color:#00ff88;font-family:monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;cursor:pointer;">NEWS</button>
            <button class="ai-tab-btn" data-tab="analyst" style="flex:1;padding:6px 8px;background:transparent;border:1px solid rgba(0,255,136,0.1);border-radius:5px;color:#445566;font-family:monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;cursor:pointer;">ANALYST</button>
            <button class="ai-tab-btn" data-tab="smartview" style="flex:1;padding:6px 8px;background:transparent;border:1px solid rgba(0,255,136,0.1);border-radius:5px;color:#445566;font-family:monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;cursor:pointer;">SMART VIEW</button>
          </div>
        </div>
        <div id="tab-news" class="ai-tab-content" style="display:flex;flex-direction:column;">
          <div class="news-header">
            <span class="breaking-chip news-ticker" id="breakingChip">LIVE FEED</span>
            <span id="newsStatus">Updated from proxied feeds</span>
          </div>
          <div class="news-list" id="newsList"></div>
        </div>
        <div id="tab-analyst" class="ai-tab-content" style="display:none;flex-direction:column;">
          <div id="analystMsgs" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;"></div>
          <div style="padding:12px;border-top:1px solid rgba(0,255,136,0.12);display:flex;gap:8px;">
            <input id="analystInput" type="text" placeholder="Ask the analyst" style="flex:1;background:rgba(4,12,10,0.94);border:1px solid rgba(0,255,136,0.28);border-radius:6px;padding:9px 12px;color:#d7e4ec;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;" />
            <button id="analystSend" type="button" style="padding:9px 14px;background:transparent;border:1px solid rgba(0,255,136,0.35);border-radius:6px;color:#00ff88;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.1em;">SEND</button>
          </div>
        </div>
        <div id="tab-smartview" class="ai-tab-content" style="display:none;flex-direction:column;"></div>
      </aside>

      <div class="alert-stack" id="alertStack"></div>
      <div class="entity-popup hidden" id="entityPopup"></div>

      <div class="health-modal hidden" id="healthModal">
        <div class="health-header">
          <div class="health-title">SYSTEM HEALTH MONITOR</div>
          <button class="popup-close" id="healthClose">x</button>
        </div>
        <div class="health-grid" id="healthGrid"></div>
      </div>

      <div class="minimap-shell">
        <div id="minimap"></div>
      </div>

      <footer class="bottombar">
        <div class="coords camera-readout">
          <span class="coord-item"><span class="coord-label">LAT</span><span id="coordLat" class="coord-val">0.0000&deg;</span></span>
          <span class="coord-sep">&middot;</span>
          <span class="coord-item"><span class="coord-label">LNG</span><span id="coordLng" class="coord-val">0.0000&deg;</span></span>
          <span class="coord-sep">&middot;</span>
          <span class="coord-item"><span class="coord-label">ALT</span><span id="coordAlt" class="coord-val">&mdash;</span></span>
        </div>
        <div class="stream-counters stream-readout">
          <div class="stream-counter aircraft">
            <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12"><path d="M14 10.5v-1L9 7V2.5C9 1.67 8.33 1 7.5 1S6 1.67 6 2.5V7L1 9.5v1L6 9v4l-1.5 1V15l3-1 3 1v-1L9 13V9z"/></svg>
            <span id="hud-count-flights">0</span>
            <span class="counter-label">FLIGHTS</span>
          </div>
          <div class="stream-counter satellite">
            <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12"><circle cx="8" cy="8" r="2"/><path d="M8 1v3M8 12v3M1 8h3M12 8h3" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M3.5 3.5l2 2M10.5 10.5l2 2M3.5 12.5l2-2M10.5 5.5l2-2" stroke="currentColor" stroke-width="1"/></svg>
            <span id="hud-count-sats">0</span>
            <span class="counter-label">SATS</span>
          </div>
          <div class="stream-counter ship">
            <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12"><path d="M13 14c-1 0-2-.5-3-1-1 .5-2 1-4 1s-2-.5-3-1c-.83-.56-1-1-1-1l1.5-4.5H3V7h1.5l.5-3h7l.5 3H14v1.5h-1z"/></svg>
            <span id="hud-count-ships">0</span>
            <span class="counter-label">SHIPS</span>
          </div>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
